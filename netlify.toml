[build]
  command = "npm run build"
  publish = "dist"

# Single Page Application (Vue/React) router uchun
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Assets (JS, CSS, images) → 1 yil cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html → doim yangilansin
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
