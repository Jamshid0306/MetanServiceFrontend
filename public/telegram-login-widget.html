<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Login Widget</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      body {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
    <script>
      function postWidgetMessage(type, extra) {
        if (!window.parent) {
          return;
        }

        window.parent.postMessage(
          Object.assign({ source: "telegram-login-widget", type: type }, extra || {}),
          window.location.origin
        );
      }

      function onTelegramAuth(user) {
        postWidgetMessage("auth", { user: user });
      }

      (function renderTelegramWidget() {
        const params = new URLSearchParams(window.location.search);
        const bot = String(params.get("bot") || "").trim();

        if (!bot) {
          postWidgetMessage("error", {
            message: "Telegram login hozircha sozlanmagan.",
          });
          return;
        }

        document.write(
          '<script async src="https://telegram.org/js/telegram-widget.js?23" data-telegram-login="' +
            bot +
            '" data-size="large" data-onauth="onTelegramAuth(user)" data-request-access="write"><\/script>'
        );
      })();

      window.addEventListener("error", function () {
        postWidgetMessage("error", {
          message: "Telegram tugmasini yuklab bo'lmadi.",
        });
      });
    </script>
  </head>
  <body></body>
</html>
